<svg xmlns="http://www.w3.org/2000/svg" width="780" height="380" viewBox="0 0 780 380">
  <defs>
    <clipPath id="typing">
      <rect x="0" y="0" width="0" height="380">
        <animate attributeName="width" from="0" to="780" dur="2s" begin="1.5s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal background -->
  <rect width="780" height="380" rx="10" fill="#2d2d2d"/>

  <!-- Title bar -->
  <rect width="780" height="32" rx="10" fill="#3c3c3c"/>
  <rect y="22" width="780" height="10" fill="#3c3c3c"/>
  <circle cx="18" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="38" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="58" cy="16" r="6" fill="#27c93f"/>

  <!-- Main info box - dashed border -->
  <rect x="30" y="50" width="720" height="250" rx="8" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Left panel -->
  <!-- Title -->
  <text x="60" y="82" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="15" fill="#e8a065" font-weight="700">Claude Code</text>
  <text x="185" y="82" font-family="'SF Mono', Consolas, monospace" font-size="13" fill="#e8a065">v2.8.0</text>

  <text x="100" y="115" font-family="'SF Mono', Consolas, monospace" font-size="13" fill="#d4d4d4">Welcome back Meaghan!</text>

  <!-- Pixel art mascot (simplified cute robot) -->
  <!-- Head -->
  <rect x="140" y="130" width="4" height="4" fill="#e8a065"/>
  <rect x="156" y="130" width="4" height="4" fill="#e8a065"/>
  <rect x="136" y="134" width="28" height="4" fill="#e8a065"/>
  <rect x="132" y="138" width="36" height="4" fill="#e8a065"/>
  <rect x="132" y="142" width="4" height="4" fill="#e8a065"/>
  <rect x="140" y="142" width="4" height="4" fill="#2d2d2d"/>
  <rect x="136" y="142" width="4" height="4" fill="#e8a065"/>
  <rect x="144" y="142" width="12" height="4" fill="#e8a065"/>
  <rect x="156" y="142" width="4" height="4" fill="#2d2d2d"/>
  <rect x="160" y="142" width="4" height="4" fill="#e8a065"/>
  <rect x="164" y="142" width="4" height="4" fill="#e8a065"/>
  <rect x="132" y="146" width="36" height="4" fill="#e8a065"/>
  <rect x="132" y="150" width="36" height="4" fill="#e8a065"/>
  <rect x="136" y="154" width="28" height="4" fill="#e8a065"/>
  <!-- Body -->
  <rect x="136" y="158" width="28" height="4" fill="#d4856a"/>
  <rect x="132" y="162" width="36" height="4" fill="#d4856a"/>
  <rect x="132" y="166" width="36" height="4" fill="#d4856a"/>
  <rect x="132" y="170" width="36" height="4" fill="#d4856a"/>
  <rect x="128" y="166" width="4" height="8" fill="#d4856a"/>
  <rect x="168" y="166" width="4" height="8" fill="#d4856a"/>
  <!-- Legs -->
  <rect x="136" y="174" width="8" height="4" fill="#d4856a"/>
  <rect x="156" y="174" width="8" height="4" fill="#d4856a"/>

  <!-- Model info -->
  <text x="100" y="200" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#888">Sonnet 4.5 • Max 20k</text>
  <text x="65" y="218" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#888">/users/meaghan/code/apps</text>

  <!-- Divider line -->
  <line x1="380" y1="65" x2="380" y2="285" stroke="#555" stroke-width="1"/>

  <!-- Right panel - Recent activity -->
  <text x="400" y="82" font-family="'SF Mono', Consolas, monospace" font-size="13" fill="#e8a065" font-weight="700">Recent activity:</text>

  <text x="410" y="105" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#888">1m ago</text>
  <text x="490" y="105" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#d4d4d4">Updated project memory</text>

  <text x="410" y="125" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#888">8m ago</text>
  <text x="490" y="125" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#d4d4d4">Updated claude'd feet</text>

  <text x="410" y="145" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#888">2d ago</text>
  <text x="490" y="145" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#d4d4d4">Add new words to spinner</text>

  <text x="410" y="165" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#888">1w ago</text>
  <text x="490" y="165" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#d4d4d4">Update unit tests</text>

  <text x="410" y="185" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#666">... /resume for more</text>

  <!-- What's new section -->
  <text x="400" y="215" font-family="'SF Mono', Consolas, monospace" font-size="13" fill="#e8a065" font-weight="700">What's new:</text>

  <text x="410" y="238" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#d4d4d4">/agents to create subagents</text>
  <text x="410" y="256" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#d4d4d4">/security-review for review agent</text>
  <text x="410" y="274" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#d4d4d4">ctrl+b to background bashes</text>
  <text x="410" y="290" font-family="'SF Mono', Consolas, monospace" font-size="12" fill="#666">... /help for more</text>

  <!-- Prompt area at bottom -->
  <text x="30" y="340" font-family="'SF Mono', Consolas, monospace" font-size="14" fill="#d4d4d4">&gt;</text>

  <!-- Typing text with clip animation -->
  <g clip-path="url(#typing)">
    <text x="46" y="340" font-family="'SF Mono', Consolas, monospace" font-size="14" fill="#888">Try "edit &lt; filepath&gt; to ..."</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="46" y="326" width="8" height="18" rx="1" fill="#d4d4d4">
    <animate attributeName="x" values="46;340" dur="2s" begin="1.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
